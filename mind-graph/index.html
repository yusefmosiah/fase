<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cagent · mind graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0c; color: #c8c0b8; font-family: 'SF Mono', 'Fira Code', monospace; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
  #top { padding: 10px 16px 6px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 12px; }
  #top .brand { color: #50b888; font-weight: 600; letter-spacing: 1px; }
  #top .stats { color: #888; }
  #top .focus-label { color: #c4a060; }
  #top button { background: none; border: 1px solid #333; color: #888; padding: 2px 10px; border-radius: 10px; cursor: pointer; font-family: inherit; font-size: 11px; }
  #top button:hover { border-color: #666; color: #ccc; }
  #top .spacer { flex: 1; }
  #canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px; }
  canvas { display: block; }
  #bottom { padding: 6px 16px 10px; display: flex; gap: 12px; align-items: center; font-size: 11px; color: #555; flex-wrap: wrap; }
  .legend-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #555; font-size: 14px; }
</style>
</head>
<body>
<div id="loading">loading work graph...</div>
<div id="top" style="display:none">
  <span class="brand">CAGENT</span>
  <span class="stats" id="stats"></span>
  <span class="focus-label" id="focus-label"></span>
  <span class="spacer"></span>
  <button id="btn-back" style="display:none">&larr; overview</button>
</div>
<div id="canvas-wrap" style="display:none">
  <canvas id="cv"></canvas>
</div>
<div id="bottom" style="display:none">
  <span><span class="legend-dot" style="background:#5a6a7a"></span>draft</span>
  <span><span class="legend-dot" style="background:#c4a060"></span>ready</span>
  <span><span class="legend-dot" style="background:#50b888"></span>running</span>
  <span><span class="legend-dot" style="background:#d06060"></span>blocked</span>
  <span><span class="legend-dot" style="background:#408868"></span>done</span>
  <span style="margin-left:auto;color:#444">click to focus &middot; esc to ascend &middot; hover for detail</span>
</div>
<script type="module" src="/mind-graph.js"></script>
</body>
</html>
